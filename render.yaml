services:
  - type: web
    name: spotter
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run serve
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: TIKHUB_API_KEY
        sync: false
      - key: AMAZON_API_KEY
        sync: false
